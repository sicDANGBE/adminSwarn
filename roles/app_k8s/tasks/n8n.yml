- name: Creation du namespace admin (si absent)
  kubernetes.core.k8s:
    kubeconfig: /etc/rancher/k3s/k3s.yaml
    api_version: v1
    kind: Namespace
    name: admin
    state: present

- name: "Vérification des variables d'authentification admin"
  assert:
    that:
      - admin_auth_user is defined
      - admin_auth_password is defined or admin_auth_password_bcrypt is defined
    fail_msg: "Définis admin_auth_user et admin_auth_password (ou admin_auth_password_bcrypt)."

- name: "Vérification des secrets natifs n8n"
  assert:
    that:
      - n8n_encryption_key is defined
      - (n8n_encryption_key | string | length) >= 32
      - n8n_basic_auth_password is defined or admin_auth_password is defined
    fail_msg: "Définis n8n_encryption_key (32+ caracteres) et n8n_basic_auth_password, ou bien admin_auth_password."

- name: "Construction de la ligne htpasswd"
  set_fact:
    admin_auth_users_line: >-
      {{ admin_auth_user }}:{{ admin_auth_password_bcrypt if admin_auth_password_bcrypt is defined else (admin_auth_password | password_hash('bcrypt')) }}
    n8n_basic_auth_user_effective: "{{ n8n_basic_auth_user | default(admin_auth_user) }}"
    n8n_basic_auth_password_effective: "{{ n8n_basic_auth_password | default(admin_auth_password) }}"

- name: Déploiement n8n durci
  kubernetes.core.k8s:
    kubeconfig: /etc/rancher/k3s/k3s.yaml
    state: present
    namespace: admin
    definition:
      apiVersion: v1
      kind: List
      items:
        - apiVersion: v1
          kind: PersistentVolumeClaim
          metadata:
            name: n8n-data
            namespace: admin
          spec:
            accessModes: [ "ReadWriteOnce" ]
            storageClassName: "{{ storage_class }}"
            resources:
              requests:
                storage: 5Gi

        - apiVersion: v1
          kind: Secret
          metadata:
            name: n8n-security
            namespace: admin
          type: Opaque
          stringData:
            basic-auth-user: "{{ n8n_basic_auth_user_effective }}"
            basic-auth-password: "{{ n8n_basic_auth_password_effective }}"
            encryption-key: "{{ n8n_encryption_key }}"

        - apiVersion: v1
          kind: Secret
          metadata:
            name: admin-basic-auth
            namespace: admin
          type: Opaque
          stringData:
            users: "{{ admin_auth_users_line }}"

        - apiVersion: traefik.io/v1alpha1
          kind: Middleware
          metadata:
            name: admin-auth
            namespace: admin
          spec:
            basicAuth:
              secret: admin-basic-auth

        - apiVersion: traefik.io/v1alpha1
          kind: Middleware
          metadata:
            name: admin-security-headers
            namespace: admin
          spec:
            headers:
              browserXssFilter: true
              contentTypeNosniff: true
              customResponseHeaders:
                X-Robots-Tag: "noindex, nofollow"
              forceSTSHeader: true
              frameDeny: true
              referrerPolicy: "same-origin"
              stsIncludeSubdomains: true
              stsPreload: true
              stsSeconds: 31536000

        - apiVersion: apps/v1
          kind: Deployment
          metadata:
            name: n8n
            namespace: admin
            labels:
              app: n8n
          spec:
            replicas: 1
            selector:
              matchLabels:
                app: n8n
            template:
              metadata:
                labels:
                  app: n8n
              spec:
                automountServiceAccountToken: false
                securityContext:
                  fsGroup: 1000
                  runAsGroup: 1000
                  runAsNonRoot: true
                  runAsUser: 1000
                  seccompProfile:
                    type: RuntimeDefault
                containers:
                  - name: n8n
                    image: n8nio/n8n:latest
                    imagePullPolicy: Always
                    ports:
                      - containerPort: 5678
                    env:
                      - name: N8N_HOST
                        value: "n8n.{{ main_domain }}"
                      - name: N8N_PORT
                        value: "5678"
                      - name: N8N_PROTOCOL
                        value: "https"
                      - name: N8N_EDITOR_BASE_URL
                        value: "https://n8n.{{ main_domain }}/"
                      - name: N8N_PROXY_HOPS
                        value: "1"
                      - name: N8N_BASIC_AUTH_ACTIVE
                        value: "true"
                      - name: N8N_BASIC_AUTH_USER
                        valueFrom:
                          secretKeyRef:
                            name: n8n-security
                            key: basic-auth-user
                      - name: N8N_BASIC_AUTH_PASSWORD
                        valueFrom:
                          secretKeyRef:
                            name: n8n-security
                            key: basic-auth-password
                      - name: N8N_ENCRYPTION_KEY
                        valueFrom:
                          secretKeyRef:
                            name: n8n-security
                            key: encryption-key
                      - name: N8N_SECURE_COOKIE
                        value: "true"
                      - name: N8N_DIAGNOSTICS_ENABLED
                        value: "false"
                      - name: N8N_PERSONALIZATION_ENABLED
                        value: "false"
                      - name: N8N_VERSION_NOTIFICATIONS_ENABLED
                        value: "false"
                      - name: WEBHOOK_URL
                        value: "https://n8n.{{ main_domain }}/"
                    livenessProbe:
                      tcpSocket:
                        port: 5678
                      initialDelaySeconds: 60
                      periodSeconds: 20
                    readinessProbe:
                      tcpSocket:
                        port: 5678
                      initialDelaySeconds: 20
                      periodSeconds: 10
                    startupProbe:
                      tcpSocket:
                        port: 5678
                      failureThreshold: 30
                      periodSeconds: 10
                    resources:
                      requests:
                        cpu: "250m"
                        memory: "512Mi"
                      limits:
                        cpu: "1000m"
                        memory: "1Gi"
                    securityContext:
                      allowPrivilegeEscalation: false
                      capabilities:
                        drop:
                          - ALL
                      readOnlyRootFilesystem: false
                    volumeMounts:
                      - name: data
                        mountPath: /home/node/.n8n
                volumes:
                  - name: data
                    persistentVolumeClaim:
                      claimName: n8n-data

        - apiVersion: v1
          kind: Service
          metadata:
            name: n8n
            namespace: admin
          spec:
            type: ClusterIP
            selector:
              app: n8n
            ports:
              - port: 80
                targetPort: 5678

        - apiVersion: networking.k8s.io/v1
          kind: NetworkPolicy
          metadata:
            name: n8n-ingress-only-from-traefik
            namespace: admin
          spec:
            podSelector:
              matchLabels:
                app: n8n
            policyTypes:
              - Ingress
            ingress:
              - from:
                  - namespaceSelector:
                      matchLabels:
                        kubernetes.io/metadata.name: kube-system
                    podSelector:
                      matchLabels:
                        app.kubernetes.io/name: traefik
                ports:
                  - protocol: TCP
                    port: 5678

        - apiVersion: networking.k8s.io/v1
          kind: Ingress
          metadata:
            name: n8n
            namespace: admin
            annotations:
              traefik.ingress.kubernetes.io/router.entrypoints: websecure
              traefik.ingress.kubernetes.io/router.tls: "true"
              traefik.ingress.kubernetes.io/router.tls.certresolver: "le"
              traefik.ingress.kubernetes.io/router.middlewares: "admin-admin-auth@kubernetescrd,admin-admin-security-headers@kubernetescrd"
          spec:
            ingressClassName: traefik
            rules:
              - host: "n8n.{{ main_domain }}"
                http:
                  paths:
                    - path: /
                      pathType: Prefix
                      backend:
                        service:
                          name: n8n
                          port:
                            number: 80
