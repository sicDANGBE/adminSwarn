---
# roles/app_k8s/tasks/nodered.yml

- name: "Définition de la version cible Node-RED"
  set_fact:
    nodered_target_image: "nodered/node-red:4.1.2-22"

- name: Creation du namespace admin (si absent)
  kubernetes.core.k8s:
    kubeconfig: /etc/rancher/k3s/k3s.yaml
    api_version: v1
    kind: Namespace
    name: admin
    state: present

# 1.b AUTH (Traefik BasicAuth, shared admin namespace)
- name: "Vérification des variables d'authentification admin"
  assert:
    that:
      - admin_auth_user is defined
      - admin_auth_password is defined or admin_auth_password_bcrypt is defined
    fail_msg: "Définis admin_auth_user et admin_auth_password (ou admin_auth_password_bcrypt)."

- name: "Vérification des secrets natifs Node-RED"
  assert:
    that:
      - nodered_credential_secret is defined or n8n_encryption_key is defined
    fail_msg: "Définis nodered_credential_secret, ou au minimum n8n_encryption_key pour chiffrer les credentials Node-RED."

- name: "Construction de la ligne htpasswd"
  set_fact:
    admin_auth_users_line: >-
      {{ admin_auth_user }}:{{ admin_auth_password_bcrypt if admin_auth_password_bcrypt is defined else (admin_auth_password | password_hash('bcrypt')) }}
    nodered_auth_user_effective: "{{ nodered_auth_user | default(admin_auth_user) }}"
    nodered_auth_password_hash_effective: "{{ nodered_auth_password_bcrypt | default(admin_auth_password_bcrypt if admin_auth_password_bcrypt is defined else (admin_auth_password | password_hash('bcrypt'))) }}"
    nodered_credential_secret_effective: "{{ nodered_credential_secret | default(n8n_encryption_key) }}"

- name: Déploiement Node-RED durci
  kubernetes.core.k8s:
    kubeconfig: /etc/rancher/k3s/k3s.yaml
    state: present
    namespace: admin
    definition:
      apiVersion: v1
      kind: List
      items:
        # --- PERSISTANCE ---
        - apiVersion: v1
          kind: PersistentVolumeClaim
          metadata:
            name: nodered-data
            namespace: admin
          spec:
            accessModes: [ "ReadWriteOnce" ]
            storageClassName: "{{ storage_class }}"
            resources:
              requests:
                storage: 5Gi

        - apiVersion: v1
          kind: Secret
          metadata:
            name: nodered-security
            namespace: admin
          type: Opaque
          stringData:
            admin-user: "{{ nodered_auth_user_effective }}"
            admin-password-hash: "{{ nodered_auth_password_hash_effective }}"
            http-node-user: "{{ nodered_auth_user_effective }}"
            http-node-password-hash: "{{ nodered_auth_password_hash_effective }}"
            credential-secret: "{{ nodered_credential_secret_effective }}"

        - apiVersion: v1
          kind: Secret
          metadata:
            name: admin-basic-auth
            namespace: admin
          type: Opaque
          stringData:
            users: "{{ admin_auth_users_line }}"

        - apiVersion: v1
          kind: ConfigMap
          metadata:
            name: nodered-settings
            namespace: admin
          data:
            settings.js: |
              module.exports = {
                  adminAuth: {
                      type: "credentials",
                      users: [{
                          username: process.env.NODE_RED_ADMIN_USER,
                          password: process.env.NODE_RED_ADMIN_PASSWORD_HASH,
                          permissions: "*"
                      }]
                  },
                  httpNodeAuth: {
                      user: process.env.NODE_RED_HTTP_NODE_USER,
                      pass: process.env.NODE_RED_HTTP_NODE_PASSWORD_HASH
                  },
                  credentialSecret: process.env.NODE_RED_CREDENTIAL_SECRET,
                  diagnostics: {
                      enabled: false,
                      ui: false
                  },
                  runtimeState: {
                      enabled: false,
                      ui: false
                  },
                  functionExternalModules: false,
                  externalModules: {
                      autoInstall: false,
                      palette: {
                          allowInstall: false,
                          allowUpload: false
                      }
                  },
                  editorTheme: {
                      projects: {
                          enabled: false
                      }
                  }
              };

        - apiVersion: traefik.io/v1alpha1
          kind: Middleware
          metadata:
            name: admin-auth
            namespace: admin
          spec:
            basicAuth:
              secret: admin-basic-auth

        - apiVersion: traefik.io/v1alpha1
          kind: Middleware
          metadata:
            name: admin-security-headers
            namespace: admin
          spec:
            headers:
              browserXssFilter: true
              contentTypeNosniff: true
              customResponseHeaders:
                X-Robots-Tag: "noindex, nofollow"
              forceSTSHeader: true
              frameDeny: true
              referrerPolicy: "same-origin"
              stsIncludeSubdomains: true
              stsPreload: true
              stsSeconds: 31536000

        # --- DEPLOYMENT ---
        - apiVersion: apps/v1
          kind: Deployment
          metadata:
            name: nodered
            namespace: admin
            labels:
              app: nodered
          spec:
            replicas: 1
            selector:
              matchLabels:
                app: nodered
            template:
              metadata:
                labels:
                  app: nodered
              spec:
                automountServiceAccountToken: false
                securityContext:
                  fsGroup: 1000
                  runAsGroup: 1000
                  runAsNonRoot: true
                  runAsUser: 1000
                  seccompProfile:
                    type: RuntimeDefault
                containers:
                  - name: nodered
                    image: "{{ nodered_target_image }}"
                    imagePullPolicy: IfNotPresent
                    ports:
                      - containerPort: 1880
                    env:
                      - name: TZ
                        value: "Europe/Paris"
                      - name: NODE_RED_ADMIN_USER
                        valueFrom:
                          secretKeyRef:
                            name: nodered-security
                            key: admin-user
                      - name: NODE_RED_ADMIN_PASSWORD_HASH
                        valueFrom:
                          secretKeyRef:
                            name: nodered-security
                            key: admin-password-hash
                      - name: NODE_RED_HTTP_NODE_USER
                        valueFrom:
                          secretKeyRef:
                            name: nodered-security
                            key: http-node-user
                      - name: NODE_RED_HTTP_NODE_PASSWORD_HASH
                        valueFrom:
                          secretKeyRef:
                            name: nodered-security
                            key: http-node-password-hash
                      - name: NODE_RED_CREDENTIAL_SECRET
                        valueFrom:
                          secretKeyRef:
                            name: nodered-security
                            key: credential-secret
                    livenessProbe:
                      tcpSocket:
                        port: 1880
                      initialDelaySeconds: 45
                      periodSeconds: 20
                    readinessProbe:
                      tcpSocket:
                        port: 1880
                      initialDelaySeconds: 15
                      periodSeconds: 10
                    startupProbe:
                      tcpSocket:
                        port: 1880
                      failureThreshold: 30
                      periodSeconds: 10
                    resources:
                      requests:
                        cpu: "100m"
                        memory: "256Mi"
                      limits:
                        cpu: "500m"
                        memory: "512Mi"
                    securityContext:
                      allowPrivilegeEscalation: false
                      capabilities:
                        drop:
                          - ALL
                      readOnlyRootFilesystem: false
                    volumeMounts:
                      - name: data
                        mountPath: /data
                      - name: settings
                        mountPath: /data/settings.js
                        subPath: settings.js
                        readOnly: true
                volumes:
                  - name: data
                    persistentVolumeClaim:
                      claimName: nodered-data
                  - name: settings
                    configMap:
                      name: nodered-settings

        # --- SERVICE ---
        - apiVersion: v1
          kind: Service
          metadata:
            name: nodered
            namespace: admin
          spec:
            type: ClusterIP
            selector:
              app: nodered
            ports:
              - port: 80
                targetPort: 1880

        - apiVersion: networking.k8s.io/v1
          kind: NetworkPolicy
          metadata:
            name: nodered-ingress-only-from-traefik
            namespace: admin
          spec:
            podSelector:
              matchLabels:
                app: nodered
            policyTypes:
              - Ingress
            ingress:
              - from:
                  - namespaceSelector:
                      matchLabels:
                        kubernetes.io/metadata.name: kube-system
                    podSelector:
                      matchLabels:
                        app.kubernetes.io/name: traefik
                ports:
                  - protocol: TCP
                    port: 1880

        # --- INGRESS ---
        - apiVersion: networking.k8s.io/v1
          kind: Ingress
          metadata:
            name: nodered
            namespace: admin
            annotations:
              traefik.ingress.kubernetes.io/router.entrypoints: websecure
              traefik.ingress.kubernetes.io/router.tls: "true"
              traefik.ingress.kubernetes.io/router.tls.certresolver: "le"
              traefik.ingress.kubernetes.io/router.middlewares: "admin-admin-auth@kubernetescrd,admin-admin-security-headers@kubernetescrd"
          spec:
            ingressClassName: traefik
            rules:
              - host: "red.{{ main_domain }}"
                http:
                  paths:
                    - path: /
                      pathType: Prefix
                      backend:
                        service:
                          name: nodered
                          port:
                            number: 80
